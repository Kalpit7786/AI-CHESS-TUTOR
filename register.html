<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Chess Tutor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">AI Chess Tutor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="play.html">Play AI</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="lessons.html">Lessons</a>
                    </li>
                    <li class="nav-item" id="navProfileItem">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>
                    <li class="nav-item" id="navLoginItem">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 60px; margin-bottom: 60px;">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card p-4 shadow">
                    <h3 class="text-center mb-4">Create Your Account</h3>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="nameInput" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="nameInput" placeholder="Enter your name"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="emailInput" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="emailInput"
                                placeholder="grandmaster@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="regPasswordInput" class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPasswordInput" placeholder="********"
                                required>
                            <div class="form-text" style="font-size: 0.85em; color: #666;">
                                * Must be at least 8 characters.
                            </div>
                            <div id="lengthError" class="text-danger mt-1" style="display: none; font-size: 0.85em;">
                                Password is too short! It must be 8 or more characters.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPasswordInput" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPasswordInput" placeholder="********"
                                required>
                            <div id="matchError" class="text-danger mt-1" style="display: none; font-size: 0.85em;">
                                Passwords do not match! Please try again.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>
                    </form>

                    <div class="text-center mt-3">
                        <small>Already have an account? <a href="login.html">Log in here</a></small>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold" id="toastMessage">
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
